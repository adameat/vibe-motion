# Example network-camera profile. Replace the URL and paths.
daemon off
log_level 6
target_dir /var/lib/vibe-motion

width 1280
height 720
framerate 5
noise_level 32
threshold 1500
minimum_motion_frames 3
event_gap 30
pre_capture 3
post_capture 120

snapshot_interval 15
snapshot_filename snapshot/%$/snap%S
picture_output best
picture_filename events/%$/%Y/%m/%$-%Y%m%d%H%M%S
locate_motion_mode preview
locate_motion_style redbox

movie_output on
movie_passthrough on
movie_codec copy
# Fixed codec means transcoding, even when the camera already uses HEVC:
# movie_codec hevc
# movie_encoder libx265
movie_quality 60
movie_bitrate 0
movie_keyframe_interval 10
movie_container mp4
movie_max_time 0
movie_filename events/%$/%Y/%m/%$-%Y%m%d%H%M%S

timelapse_interval 1
timelapse_mode hourly
timelapse_fps 1
timelapse_container mkv
timelapse_codec mpeg4
# For an FFmpeg build with x265: timelapse_codec hevc
# To require x265 specifically: timelapse_encoder libx265
timelapse_quality 60
timelapse_bitrate 0
timelapse_keyframe_interval 60
timelapse_filename timelapse/%$/%Y/%m/%$-%Y%m%d%H%M%S

webcontrol_port 8880
webcontrol_localhost on
webcontrol_parms 0
stream_codec copy
# Fixed codec means one transcoder per active web client:
# stream_codec hevc
# stream_encoder libx265
stream_quality 60
stream_bitrate 0
stream_keyframe_interval 2

on_event_start /usr/local/libexec/vibe-motion/event-start %t %v %Y-%m-%dT%H:%M:%S %o %D %N
on_event_end /usr/local/libexec/vibe-motion/event-end %t %v %Y-%m-%dT%H:%M:%S
on_picture_save /usr/local/libexec/vibe-motion/picture-save %t %v "%f" %n
on_movie_start /usr/local/libexec/vibe-motion/movie-start %t %v "%f" %n
on_movie_end /usr/local/libexec/vibe-motion/movie-end %t %v "%f" %n

camera camera01.conf
