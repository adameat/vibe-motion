# One camera address is enough. Auto mode recognizes a working native Reolink
# Baichuan endpoint on TCP port 9000 without Neolink or another sidecar.
camera_id 12
camera_name baichuan-camera

camera_url http://192.0.2.12/onvif/device_service
camera_userpass admin:change-me
camera_auth auto
media_transport auto
media_port 9000
media_channel 0
media_stream main

# ONVIF camera-generated events remain independent of the selected media path.
events on
motion_detection off
decode_frames auto

width auto
height auto

movie_output on
movie_passthrough on
movie_codec copy
movie_container mp4

# Use "copy" for a native fragmented-MP4 web stream, or leave this as "mjpeg"
# for Motion-compatible MJPEG routes.
stream_codec copy
