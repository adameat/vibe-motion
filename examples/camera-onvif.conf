camera_id 2
camera_name onvif-camera

# Device service endpoint. netcam_url is not required when this is set:
# vibe-motion discovers Media/Events services and asks Media for the RTSP URI.
onvif_url http://192.0.2.20:8000/onvif/device_service
onvif_userpass user:password
onvif_auth auto

# Optional exact media profile Name (token is also accepted).
# With no selector the profile with the largest resolution is used.
# onvif_profile Profile000_MainStream

# width/height are optional for ONVIF. The selected profile resolution is used.
# Set explicit values to scale analysis, or use "auto" to undo inherited values.

# Pull ONVIF notifications and use common motion topics as an event source.
onvif_events on
# Diagnostic mode: log every notification as one JSON object, including the
# raw NotificationMessage XML and topics not treated as motion.
onvif_log_events off
onvif_motion_topics Motion,MotionAlarm,CellMotionDetector,PeopleDetect,VehicleDetect,DogCatDetect,FaceDetect

# Disable pixel analysis. Keep this on to combine local and camera motion by OR.
motion_detection off

netcam_use_tcp on
framerate 5
event_gap 10
movie_passthrough on
