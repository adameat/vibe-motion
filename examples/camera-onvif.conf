camera_id 2
camera_name onvif-camera

# Put the camera address and credentials in one place. In auto mode vibe-motion
# first probes native Reolink Baichuan, then uses ONVIF discovery when available.
camera_url http://192.0.2.20:8000/onvif/device_service
camera_userpass user:password
camera_auth auto
camera_tls_verify on
media_transport auto
media_port 9000

# Optional exact media profile Name (token is also accepted).
# With no selector the profile with the largest resolution is used.
# media_profile Profile000_MainStream

# width/height are optional for ONVIF. The selected profile resolution is used.
# Set explicit values to scale analysis, or use "auto" to undo inherited values.

# Pull ONVIF notifications and use common motion topics as an event source.
events on
# Diagnostic mode: log every notification as one JSON object, including the
# raw NotificationMessage XML and topics not treated as motion.
events_log off
events_topics Motion,MotionAlarm,CellMotionDetector,PeopleDetect,VehicleDetect,DogCatDetect,FaceDetect

# Disable pixel analysis. Keep this on to combine local and camera motion by OR.
motion_detection off

# Decode only keyframes while idle, then temporarily decode every frame when an
# HTTP snapshot/MJPEG consumer connects. Compressed recording packets are kept.
decode_frames auto

media_use_tcp on
framerate 5
event_gap 10
movie_passthrough on
