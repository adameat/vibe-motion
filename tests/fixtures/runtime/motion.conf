daemon off
log_file /tmp/vibe-motion-runtime.log
log_level 9
target_dir /tmp/vibe-motion-runtime
width 160
height 120
framerate 10
noise_level 5
threshold 10
minimum_motion_frames 1
event_gap 1
pre_capture 10
post_capture 5
snapshot_interval 1
snapshot_filename snapshot/%$/snap%S
picture_output best
picture_filename events/%$/%Y%m%d%H%M%S
locate_motion_mode preview
locate_motion_style redbox
movie_output on
movie_passthrough on
movie_container mp4
movie_filename events/%$/%Y%m%d%H%M%S
timelapse_interval 1
timelapse_mode hourly
timelapse_filename timelapse/%$/%Y%m%d%H%M%S
timelapse_fps 1
timelapse_container mpeg4
webcontrol_port 18880
webcontrol_localhost on
stream_preview_method mjpg
on_event_start /usr/bin/touch /tmp/vibe-motion-event-start-%v
on_event_end /usr/bin/touch /tmp/vibe-motion-event-end-%v
camera camera.conf
