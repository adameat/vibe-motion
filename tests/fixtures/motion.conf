# Motion-compatible main configuration
target_dir = output
webcontrol_port 8880
webcontrol_localhost off
width 800
height 600
framerate 5
threshold 6000
movie_passthrough on
lightswitch 50
on_event_start /hooks/start %t %v %$
future_global retained value

camera cameras/first.conf

; Inheritance is a snapshot: only the second camera sees this.
width 1280
camera cameras/second.conf
