daemon off
setup_mode off
log_file /var/log/motion/motion.log
log_level 9
log_type ALL
database_type
device_name
device_id
width 640
height 480
framerate 15
threshold 6000
threshold_tune on
noise_level 128
despeckle_filter EedDl
lightswitch 50
minimum_motion_frames 3
event_gap 30
pre_capture 3
post_capture 120
target_dir /var/lib/vibe-motion
snapshot_interval 15
snapshot_filename snapshot/%$/snap%S
picture_output best
picture_filename events/%$/%Y/%m/%$-%Y%m%d%H%M%S
locate_motion_mode preview
locate_motion_style redbox
movie_output on
movie_passthrough on
movie_codec copy
movie_bitrate 750000
movie_keyframe_interval 5
movie_container mp4
movie_filename events/%$/%Y/%m/%$-%Y%m%d%H%M%S
movie_max_time 0
timelapse_interval 1
timelapse_mode hourly
timelapse_filename timelapse/%$/%Y/%m/%$-%Y%m%d%H%M%S
timelapse_fps 1
timelapse_container mpeg4
timelapse_codec mpeg4
timelapse_quality 72
timelapse_bitrate 600000
timelapse_keyframe_interval 30
netcam_params rtsp_transport=tcp,interrupt=15
webcontrol_port 8880
webcontrol_localhost on
webcontrol_parms 0
stream_preview_scale 25
stream_preview_method mjpg
stream_codec copy
stream_quality 65
stream_bitrate 500000
stream_keyframe_interval 2
camera camera01.conf
camera camera02.conf
camera camera03.conf
